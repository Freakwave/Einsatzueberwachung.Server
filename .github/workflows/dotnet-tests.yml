name: .NET Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Tests-Projekt
        run: dotnet restore src/Einsatzueberwachung.Tests/Einsatzueberwachung.Tests.csproj

      - name: Build Tests-Projekt
        run: dotnet build src/Einsatzueberwachung.Tests/Einsatzueberwachung.Tests.csproj -c Release --no-restore

      - name: Run Tests
        run: dotnet test src/Einsatzueberwachung.Tests/Einsatzueberwachung.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload Test-Ergebnisse
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 14
