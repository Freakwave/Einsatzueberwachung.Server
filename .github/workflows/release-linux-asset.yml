name: Release Linux Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (z. B. v1.1.3)"
        required: true

permissions:
  contents: write

jobs:
  build-livetracking:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish LiveTracking (Windows x64)
        run: dotnet publish src/Einsatzueberwachung.LiveTracking -c Release -r win-x64 --self-contained true -o artifacts/livetracking

      - name: Create livetracking.zip
        shell: pwsh
        run: Compress-Archive -Path artifacts/livetracking/* -DestinationPath artifacts/livetracking.zip

      - name: Upload livetracking artifact
        uses: actions/upload-artifact@v4
        with:
          name: livetracking-zip
          path: artifacts/livetracking.zip

  build-server:
    runs-on: ubuntu-latest
    needs: build-livetracking

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish server linux-x64
        run: dotnet publish src/Einsatzueberwachung.Server -c Release -r linux-x64 --self-contained false -o artifacts/release/linux-x64/server-${{ steps.version.outputs.version }}

      # Sicherstellen, dass libSkiaSharp.so im Publish-Output liegt.
      # Mit `--self-contained false` und framework-dependent Publish kommt die native lib
      # nicht zuverlaessig mit, obwohl SkiaSharp.NativeAssets.Linux referenziert ist.
      # Wir kopieren sie deshalb explizit aus dem NuGet-Cache.
      - name: Ensure libSkiaSharp.so in publish output
        shell: bash
        run: |
          PUBLISH_DIR="artifacts/release/linux-x64/server-${{ steps.version.outputs.version }}"
          if [ -f "$PUBLISH_DIR/libSkiaSharp.so" ] || [ -f "$PUBLISH_DIR/runtimes/linux-x64/native/libSkiaSharp.so" ]; then
            echo "libSkiaSharp.so bereits im Publish-Output vorhanden"
          else
            SKIA_SO=$(find ~/.nuget/packages/skiasharp.nativeassets.linux -path "*/linux-x64/native/libSkiaSharp.so" | sort -V | tail -1)
            if [ -z "$SKIA_SO" ]; then
              echo "::error::libSkiaSharp.so nicht im NuGet-Cache gefunden"
              exit 1
            fi
            cp "$SKIA_SO" "$PUBLISH_DIR/libSkiaSharp.so"
            echo "libSkiaSharp.so kopiert von $SKIA_SO ($(stat -c%s "$PUBLISH_DIR/libSkiaSharp.so") bytes)"
          fi

      - name: Download livetracking artifact
        uses: actions/download-artifact@v4
        with:
          name: livetracking-zip
          path: artifacts/release/linux-x64/server-${{ steps.version.outputs.version }}

      - name: Create zip asset
        shell: bash
        run: |
          cd artifacts/release/linux-x64/server-${{ steps.version.outputs.version }}
          zip -r ../linux-x64-server-${{ steps.version.outputs.version }}.zip .

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/release/linux-x64/linux-x64-server-${{ steps.version.outputs.version }}.zip
          overwrite_files: true
