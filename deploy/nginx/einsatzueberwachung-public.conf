# Oeffentlicher Server-Block fuer die Mobile-Team-Ansicht (DuckDNS/Dynu Hostname).
# Erlaubt nur die fuer Teams notwendigen Routen, alles andere -> 404.
# Nginx-Config-Test:  nginx -t   |   Reload:  systemctl reload nginx

# Rate-Limit Zone gegen Brute-Force auf den Master-Token. Muss im http{}-Block stehen,
# alternativ in einem conf.d-Snippet.
limit_req_zone $binary_remote_addr zone=team_join_zone:10m rate=20r/m;

server {
    listen 443 ssl;
    server_name dein-einsatz.mywire.org;

    ssl_certificate     /etc/letsencrypt/live/dein-einsatz.mywire.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dein-einsatz.mywire.org/privkey.pem;

    # Sicherheit: minimale TLS-Version, HSTS, kein Indexing
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Default proxy-Header (DRY)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Token-Login (Brute-Force-Schutz)
    location /team/login {
        limit_req zone=team_join_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
    }

    # Team-Mobile-Seite
    location = /team {
        proxy_pass http://127.0.0.1:5000;
    }

    location /team/ {
        proxy_pass http://127.0.0.1:5000;
    }

    # REST fuer Mobile-API
    location /api/team-mobile/ {
        limit_req zone=team_join_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
    }

    # SignalR-Hub des Mobile-Endpoints (nur dieser, nicht /hubs/einsatz)
    location /hubs/team-mobile {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
    }

    # Blazor-Circuit (wird fuer InteractiveServer benoetigt)
    location /_blazor {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
    }

    # Statische Assets, die fuer das Rendering benoetigt werden
    location /_framework/ { proxy_pass http://127.0.0.1:5000; }
    location /_content/   { proxy_pass http://127.0.0.1:5000; }
    location /css/        { proxy_pass http://127.0.0.1:5000; }
    location /js/         { proxy_pass http://127.0.0.1:5000; }
    location /lib/        { proxy_pass http://127.0.0.1:5000; }
    location /app.css     { proxy_pass http://127.0.0.1:5000; }
    location ~ ^/Einsatzueberwachung\.Server\.styles\.css$  { proxy_pass http://127.0.0.1:5000; }
    location /leaflet-interop.js  { proxy_pass http://127.0.0.1:5000; }
    location /leaflet-custom.css  { proxy_pass http://127.0.0.1:5000; }
    location /print-map.css       { proxy_pass http://127.0.0.1:5000; }
    location = /favicon.png       { proxy_pass http://127.0.0.1:5000; }
    location = /favicon.ico       { proxy_pass http://127.0.0.1:5000; }

    # Alles andere: nicht oeffentlich -> 404
    location / { return 404; }
}
