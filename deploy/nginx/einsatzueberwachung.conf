server {
    listen 80;
    server_name einsatz.vpn.local _;

    allow 10.10.0.0/24;
    deny all;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name einsatz.vpn.local _;

    ssl_certificate /etc/ssl/certs/einsatz.crt;
    ssl_certificate_key /etc/ssl/private/einsatz.key;

    # VPN-only: nur Wireguard-Range darf rein. Alles andere bekommt 403.
    allow 10.10.0.0/24;
    deny all;

    # PDF-/Excel-/ZIP-Downloads koennen je nach Last und Tile-Server-Antwortzeit
    # laenger als 60s brauchen (Default-Timeout). Hier explizit hochgezogen,
    # damit "Drucken mit Karte" keinen 502 Bad Gateway liefert.
    location /downloads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    5m;
        proxy_read_timeout    5m;

        # Grosse PDFs/ZIPs nicht im Speicher puffern
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100m;
    }

    # Hauptanwendung
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Etwas grosszuegigeres Timeout als der 60s-Default fuer alle Requests.
        proxy_read_timeout 2m;
    }

    # SignalR / WebSocket
    location /hubs/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1h;
    }
}
