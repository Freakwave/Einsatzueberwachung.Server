version: '3.9'

services:

  # ── Hauptanwendung ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: src/Einsatzueberwachung.Server/Dockerfile
    image: einsatzueberwachung-server:latest
    container_name: einsatz-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - einsatz-data:/opt/einsatzueberwachung/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - EINSATZ_DATA_DIR=/opt/einsatzueberwachung/data
      - EINSATZ_REPORTS_DIR=/opt/einsatzueberwachung/data/berichte
      - DOTNET_PRINT_TELEMETRY_MESSAGE=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - einsatz-net

  # ── Nginx Reverse-Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: einsatz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/einsatzueberwachung.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/ssl:ro
    depends_on:
      - server
    networks:
      - einsatz-net

volumes:
  einsatz-data:
    driver: local
  nginx-certs:
    driver: local

networks:
  einsatz-net:
    driver: bridge
